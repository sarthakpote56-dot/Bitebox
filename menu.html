     <header>

            <img src="images/all meal.PNG">

        </div>
        <div class="icon-box">
            <img src="images/buger.png">
            <p>Burgers</p>
        </div>
        <div class="icon-box">
            <img src="images/capsicam pizza.png">

        <div class="icon-box">

        <h2>Our Menu</h2>
        <div class="menu-container">
            <div class="card">
                <img src="images/buger.png">
                <h3>Burger</h3>
                <p>Cheesy Burger</p>
                <span>₹199</span>
                <button>Add to Cart</button>
            </div>
            <div class="card">
                <img src="images/capsicam pizza.png">
                <h3>Capsicam Pizza</h3>

                <button>Add to Cart</button>
            </div>
            <div class="card">
                <img src="images/panner pizza.png">
                <h3>Panner Tika Pizza</h3>
                <p>Loaded with spicy paneer Tikka</p>
                <span>₹399</span>
                <button>Add to Cart</button>
            </div>
            <div class="card">
                <img src="images/pasta.webp">
                <h3>Pasta</h3>
                <p>Cream Cheesy Pasta</p>
                <span>₹249</span>
                <button>Add to Cart</button>
            </div>
        </div>
